name: openalex
version: "0.1.0"
config-version: 2

profile: openalex

model-paths: ["models"]
macro-paths: ["macros"]
test-paths: ["tests"]
seed-paths: ["seeds"]
snapshot-paths: ["snapshots"]

target-path: target
clean-targets:
  - target
  - logs
  - dbt_packages

models:
  openalex:
    staging:
      # Parse-once: staging is a native table, never a view over the external
      # table. Inherited by every model under models/staging/.
      +materialized: table
    silver:
      # Classified + projected works. Static, rebuildable corpus -> table.
      +materialized: table

vars:
  # Corpus bounds — honest prod defaults (the real 1950–2026 corpus). Dev
  # overrides to the canonical dev slice — the Q2/Q3 analytical cohort, so dev
  # gold tables preview prod numbers (counts_by_year only covers 2012+):
  #   dbt run --vars '{year_min: 2012, year_max: 2016}'
  year_min: 1950
  year_max: 2026

  # AI classification subfields (DATA_MODEL.md). Pinned by stable OpenAlex
  # subfield id, not display name. ai_strict = AI; ai_broad = AI + CV/PR.
  subfield_ai: "https://openalex.org/subfields/1702"    # Artificial Intelligence
  subfield_cv_pr: "https://openalex.org/subfields/1707" # Computer Vision and Pattern Recognition
