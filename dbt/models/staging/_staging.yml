version: 2

models:
  - name: stg_works
    description: >
      Parsed, typed, filtered, deduplicated works — one row per OpenAlex work id.
      The eight bronze JSON-string columns are flattened/typed here; the two date
      columns are SAFE-parsed; the is_retracted/is_paratext quality filters and
      the corpus-bounds guard are applied; dedup keeps the freshest updated_date.
      First native table in the warehouse; parse is paid for once.
    columns:
      - name: id
        description: OpenAlex work ID, primary key. Unique after dedup.
        tests:
          - not_null
          - unique
      - name: publication_year
        description: Shard/partition key.
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1950
                max_value: 2026
      - name: primary_topic_subfield_id
        description: >
          Subfield id from primary_topic; drives AI classification in silver.
          Soft-asserted (warn) — OpenAlex has works without a fully populated
          primary_topic. Promote to error only after the full-corpus null rate
          is confirmed near zero at the step-6 prod run.
        tests:
          - not_null:
              config:
                severity: warn
