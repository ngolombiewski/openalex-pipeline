version: 2

models:
  - name: gold_ai_share_by_year
    description: >
      Q1 — AI's share of CS works per publication year, long over the two
      ablation variants (one row per publication_year × variant). Denominator
      is all silver works in the year. is_partial_year flags the in-flight
      extraction year so the dashboard can dim it. See
      docs/design-archive/gold-design.md §2.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - publication_year
              - variant
      - dbt_utils.expression_is_true:
          arguments:
            expression: "ai_works <= cs_works"
    columns:
      - name: publication_year
        tests:
          - not_null
      - name: variant
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['strict', 'broad']
      - name: share
        description: ai_works / cs_works within the year.
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1

  - name: int_paper_half_life
    description: >
      Per-paper citation half-life (cumulative-to-50%, linearly interpolated)
      over the 2012–2016 cohort. One row per cited cohort paper; zero-citation
      papers carry no row. Intermediate for Q2 — view, single consumer.
      See docs/design-archive/gold-design.md §3a–§3c.
    columns:
      - name: id
        tests:
          - not_null
          - unique
      - name: half_life
        description: Citation age (years, continuous) at the 50% crossing.
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0

  - name: gold_citation_half_life_by_subfield
    description: >
      Q2 — citation half-life percentiles per CS subfield over the 2012–2016
      cohort, with uncited-rate context. Strict/broad AI labels identify the AI
      subfields; the published percentiles cannot be pooled downstream into
      AI-vs-rest statistics. See docs/design-archive/gold-design.md §3d.
    tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "n_cited <= n_papers"
    columns:
      - name: subfield_id
        tests:
          - not_null
          - unique
      - name: n_papers
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
      - name: uncited_rate
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1
      - name: median_half_life
        description: NULL only for a subfield with zero cited papers.
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: false

  - name: gold_citation_gini_by_subfield
    description: >
      Q3 — Gini of cited_by_count per CS subfield over the 2012–2016 cohort,
      zero-citation papers included in the headline gini; gini_cited_only is
      the cited-papers-only secondary. Strict/broad AI labels on the row.
      See docs/design-archive/gold-design.md §4.
    tests:
      # Adding zero-citation papers can only increase concentration, so the
      # headline gini bounds the cited-only gini from above.
      - dbt_utils.expression_is_true:
          arguments:
            expression: "gini_cited_only <= gini"
    columns:
      - name: subfield_id
        tests:
          - not_null
          - unique
      - name: n_papers
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
      - name: gini
        description: NULL only for an all-zero-citation subfield (nullif guard).
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1
      - name: gini_cited_only
        description: >
          Secondary lens — Gini over cited papers only
          (docs/design-archive/gold-design.md §4c), disentangling concentration
          from the uncited-rate. NULL for a subfield with no cited papers.
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1
